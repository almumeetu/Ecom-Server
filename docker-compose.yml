services:
  postgres:
    image: postgres:18-alpine
    container_name: neocomerz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neocomerz
    ports:
      - '5432:5432'
    volumes:
      - neocomerz-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d neocomerz']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neocomerz-pgdata:
